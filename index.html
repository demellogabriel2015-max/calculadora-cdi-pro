<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invest Master Pro</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#05070a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="InvestMaster">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2452/2452144.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2452/2452144.png">
    <link rel="manifest" href="./manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #c5a059;
            --bg: #05070a;
            --card: #111418;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        #install-banner {
            display: none;
            background: linear-gradient(135deg, #c5a059, #8e6d2f);
            color: black;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .card {
            background-color: var(--card);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #222;
            margin-bottom: 20px;
        }
        h1 { color: var(--primary); text-align: center; font-size: 24px; margin-top: 0; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #888; }
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            color: black;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        .result-card {
            background: #0a0d11;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid var(--primary);
        }
        .result-val { font-size: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div id="install-banner">
            ✨ INSTALAR APP PROFISSIONAL
        </div>

        <div class="card">
            <h1>INVEST MASTER</h1>
            <div class="input-group">
                <label>Valor Inicial (R$)</label>
                <input type="number" id="capital" value="10000">
            </div>
            <div class="input-group">
                <label>Aporte Mensal (R$)</label>
                <input type="number" id="monthly" value="1000">
            </div>
            <div class="input-group">
                <label>Meses</label>
                <input type="number" id="months" value="12">
            </div>
            <div class="input-group">
                <label>Taxa Selic/CDI (% ao ano)</label>
                <input type="number" id="cdi" value="10.75" step="0.25">
            </div>
            <button onclick="calculate()">SIMULAR AGORA</button>
        </div>

        <canvas id="myChart" style="width:100%; height:250px;"></canvas>

        <div id="results" class="result-card" style="display:none;">
            <p>Total CDI (Líquido): <span id="res-cdi" class="result-val"></span></p>
            <p>Total Poupança: <span id="res-poup" class="result-val"></span></p>
            <p>Diferença: <span id="res-diff" class="result-val" style="color: #4caf50;"></span></p>
        </div>
    </div>

    <script>
        let chart;
        function calculate() {
            const capital = parseFloat(document.getElementById('capital').value);
            const monthly = parseFloat(document.getElementById('monthly').value);
            const months = parseInt(document.getElementById('months').value);
            const cdiYear = parseFloat(document.getElementById('cdi').value) / 100;
            
            const cdiMonth = Math.pow(1 + cdiYear, 1/12) - 1;
            const poupMonth = 0.005; // Simplificado: 0.5% am

            let totalCDI = capital;
            let totalPoup = capital;
            let labels = [];
            let dataCDI = [capital];
            let dataPoup = [capital];

            for (let i = 1; i <= months; i++) {
                totalCDI = (totalCDI + monthly) * (1 + cdiMonth);
                totalPoup = (totalPoup + monthly) * (1 + poupMonth);
                if (i % Math.max(1, Math.floor(months/6)) === 0 || i === months) {
                    labels.push('M' + i);
                    dataCDI.push(totalCDI.toFixed(2));
                    dataPoup.push(totalPoup.toFixed(2));
                }
            }

            // Simulação de IR (Regressiva)
            let ir = 0.175;
            if (months <= 6) ir = 0.225;
            else if (months <= 12) ir = 0.20;
            else if (months <= 24) ir = 0.175;
            else ir = 0.15;

            const profitCDI = totalCDI - (capital + monthly * months);
            const netCDI = totalCDI - (profitCDI * ir);

            document.getElementById('res-cdi').innerText = 'R$ ' + netCDI.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('res-poup').innerText = 'R$ ' + totalPoup.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('res-diff').innerText = 'R$ ' + (netCDI - totalPoup).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('results').style.display = 'block';

            updateChart(labels, dataCDI, dataPoup);
        }

        function updateChart(labels, dataCDI, dataPoup) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'CDI Pro',
                        data: dataCDI,
                        borderColor: '#c5a059',
                        tension: 0.3,
                        fill: false
                    }, {
                        label: 'Poupança',
                        data: dataPoup,
                        borderColor: '#555',
                        tension: 0.3,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#888' } } },
                    scales: {
                        y: { ticks: { color: '#888' }, grid: { color: '#222' } },
                        x: { ticks: { color: '#888' }, grid: { display: false } }
                    }
                }
            });
        }

        // PWA Installation Logic
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        installBanner.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js");
            });
        }
    </script>
</body>
</html>
